services:
  db:
    image: postgres:16
    container_name: bank-postgres-db
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
    volumes:
      - bank-db-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bankdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bank-backend-api
    environment:
      DB_HOST: db
      DB_NAME: bankdb
      DB_USER: bankuser
      DB_PASSWORD: bankpass
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bank-db-data:

networks:
  bank-network:
    driver: bridge